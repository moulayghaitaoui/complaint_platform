<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap');

  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f8fafc;
    --color-background-tertiary: #f1f5f9;
    --color-text-primary: #0f172a;
    --color-text-secondary: #475569;
    --color-text-tertiary: #94a3b8;
    --color-border-primary: #cbd5e1;
    --color-border-secondary: #e2e8f0;
    --color-border-tertiary: #f1f5f9;
    --border-radius-md: 8px;
    --border-radius-lg: 16px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .lr-root {
    direction: rtl;
    font-family: 'Cairo', sans-serif;
    background: var(--color-background-tertiary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  .lr-nav {
    background: var(--color-background-primary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .lr-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 16px;
    color: var(--color-text-primary);
    text-decoration: none;
  }

  .lr-logo-icon {
    width: 28px;
    height: 28px;
    background: #1B5E3F;
    border-radius: var(--border-radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lr-logo-icon svg {
    width: 15px;
    height: 15px;
    fill: #E8F4F0;
  }

  .lr-nav-back {
    font-size: 13px;
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Cairo', sans-serif;
  }

  .lr-nav-back:hover {
    color: var(--color-text-primary);
  }

  /* LAYOUT */
  .lr-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .lr-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    width: 100%;
    max-width: 440px;
    overflow: hidden;
  }

  /* TABS */
  .lr-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .lr-tab {
    padding: 14px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--color-text-secondary);
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }

  .lr-tab.active {
    color: #1B5E3F;
    border-bottom: 2px solid #1B5E3F;
    background: var(--color-background-secondary);
  }

  /* FORM BODY */
  .lr-form-body {
    padding: 28px 28px 24px;
  }

  .lr-form-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-text-primary);
    margin-bottom: 4px;
  }

  .lr-form-sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* FIELDS */
  .lr-field {
    margin-bottom: 16px;
  }

  .lr-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-primary);
    margin-bottom: 6px;
  }

  .lr-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .lr-input-icon {
    position: absolute;
    right: 12px;
    width: 16px;
    height: 16px;
    color: var(--color-text-secondary);
    pointer-events: none;
  }

  .lr-input-icon svg {
    width: 16px;
    height: 16px;
    fill: var(--color-text-secondary);
  }

  .lr-input {
    width: 100%;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 40px 10px 12px;
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
    direction: rtl;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    outline: none;
    transition: border-color 0.2s;
  }

  .lr-input:focus {
    border-color: #1B5E3F;
    box-shadow: 0 0 0 3px #E8F4F0;
  }

  .lr-input::placeholder {
    color: var(--color-text-tertiary);
  }

  .lr-eye-btn {
    position: absolute;
    left: 10px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
  }

  .lr-eye-btn svg {
    width: 16px;
    height: 16px;
    fill: var(--color-text-secondary);
  }

  /* DIVIDER */
  .lr-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* FORGOT */
  .lr-forgot {
    text-align: left;
    margin-top: -8px;
    margin-bottom: 16px;
  }

  .lr-forgot a {
    font-size: 12px;
    color: #1B5E3F;
    text-decoration: none;
  }

  .lr-forgot a:hover {
    text-decoration: underline;
  }

  /* SUBMIT */
  .lr-submit {
    width: 100%;
    background: #1B5E3F;
    color: #E8F4F0;
    border: none;
    padding: 12px;
    border-radius: var(--border-radius-md);
    font-size: 15px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }

  .lr-submit:hover {
    background: #0F3D28;
  }

  .lr-submit:active {
    transform: scale(0.99);
  }

  /* DIVIDER LINE */
  .lr-or {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    font-size: 12px;
    color: var(--color-text-secondary);
  }

  .lr-or::before,
  .lr-or::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--color-border-tertiary);
  }

  /* SOCIAL */
  .lr-social-btn {
    width: 100%;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Cairo', sans-serif;
    color: var(--color-text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .lr-social-btn:hover {
    background: var(--color-background-tertiary);
  }

  .lr-social-btn svg {
    width: 18px;
    height: 18px;
  }

  /* TERMS */
  .lr-terms {
    font-size: 11px;
    color: var(--color-text-secondary);
    text-align: center;
    margin-top: 16px;
    line-height: 1.6;
  }

  .lr-terms a {
    color: #1B5E3F;
    text-decoration: none;
  }

  /* SELECT */
  .lr-select {
    width: 100%;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 40px 10px 12px;
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
    direction: rtl;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    outline: none;
    appearance: none;
    cursor: pointer;
  }

  .lr-select:focus {
    border-color: #1B5E3F;
    box-shadow: 0 0 0 3px #E8F4F0;
  }

  /* PASSWORD STRENGTH */
  .lr-strength {
    margin-top: 6px;
  }

  .lr-strength-bars {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
  }

  .lr-bar {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--color-border-tertiary);
    transition: background 0.3s;
  }

  .lr-bar.active-weak {
    background: #E24B4A;
  }

  .lr-bar.active-medium {
    background: #EF9F27;
  }

  .lr-bar.active-strong {
    background: #639922;
  }

  .lr-strength-label {
    font-size: 11px;
    color: var(--color-text-secondary);
  }

  /* PANEL TOGGLE */
  .lr-panel {
    display: none;
  }

  .lr-panel.visible {
    display: block;
  }

  /* FOOTER */
  .lr-footer {
    background: var(--color-background-primary);
    border-top: 0.5px solid var(--color-border-tertiary);
    padding: 14px 2rem;
    text-align: center;
    font-size: 11px;
    color: var(--color-text-secondary);
  }
</style>

<script>
  function switchTab(tab) {
    document.getElementById('panel-login').classList.remove('visible');
    document.getElementById('panel-register').classList.remove('visible');
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('tab-register').classList.remove('active');
    document.getElementById('panel-' + tab).classList.add('visible');
    document.getElementById('tab-' + tab).classList.add('active');
  }

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      btn.style.opacity = '1';
    } else {
      input.type = 'password';
      btn.style.opacity = '0.5';
    }
  }

  function checkStrength(val) {
    const bars = ['bar1', 'bar2', 'bar3', 'bar4'];
    const label = document.getElementById('strength-label');
    bars.forEach(b => {
      document.getElementById(b).className = 'lr-bar';
    });

    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val) || /[a-z]/.test(val)) score++;
    if (/\d/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const cls = score <= 1 ? 'active-weak' : score <= 2 ? 'active-medium' : 'active-strong';
    const labels = ['', 'ضعيفة', 'ضعيفة', 'متوسطة', 'قوية'];
    const colors = ['', '#E24B4A', '#E24B4A', '#EF9F27', '#639922'];

    for (let i = 0; i < score; i++) {
      document.getElementById(bars[i]).classList.add(cls);
    }
    label.textContent = val.length === 0 ? 'أدخل كلمة المرور' : labels[score];
    label.style.color = val.length === 0 ? 'var(--color-text-secondary)' : colors[score];
  }
</script>
